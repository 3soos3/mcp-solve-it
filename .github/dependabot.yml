# Dependabot configuration for automated dependency updates
# Runs weekly to keep dependencies secure and up-to-date

version: 2
updates:
  # Python (pip) dependencies — all updates in one PR, auto-merged when gate passes
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "python"
      - "automerge"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-all:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"

  # GitHub Actions dependencies — all updates in one PR, auto-merged when gate passes
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github-actions"
      - "automerge"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      github-actions-all:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"
