name: Security Monitor - Weekly pip-audit

# Weekly pip-audit of the installed package dependencies.
# Opens a GitHub issue automatically if vulnerabilities are found.
# Runs every Monday at 08:00 UTC.

on:
  schedule:
    - cron: '0 8 * * 1'   # Weekly on Monday at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Run pip-audit
        id: audit
        run: |
          set +e
          pip-audit --format json --output pip-audit.json
          AUDIT_EXIT=$?
          pip-audit --format columns || true
          echo "exit_code=${AUDIT_EXIT}" >> $GITHUB_OUTPUT
          set -e

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 90

      - name: Open issue on failure
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let vulnSummary = 'See attached pip-audit report for details.';
            let vulnCount = 0;

            try {
              const report = JSON.parse(fs.readFileSync('pip-audit.json', 'utf8'));
              const deps = report.dependencies || [];
              const vulns = deps.flatMap(d => (d.vulns || []).map(v => ({
                pkg: d.name,
                version: d.version,
                id: v.id,
                fix: v.fix_versions?.join(', ') || 'none',
                aliases: (v.aliases || []).join(', '),
              })));
              vulnCount = vulns.length;
              if (vulnCount > 0) {
                const lines = vulns.slice(0, 15).map(v =>
                  `- **${v.id}** in \`${v.pkg}@${v.version}\` — fix: \`${v.fix}\`${v.aliases ? ` (${v.aliases})` : ''}`
                );
                vulnSummary = lines.join('\n');
                if (vulnCount > 15) {
                  vulnSummary += `\n\n_...and ${vulnCount - 15} more. See the full report artifact._`;
                }
              }
            } catch (e) {
              core.warning(`Could not parse pip-audit.json: ${e.message}`);
            }

            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security', 'vulnerability', 'pip-audit'],
            });

            const existingIssue = issues.find(i =>
              i.title.includes('pip-audit: vulnerabilities detected')
            );

            const body = [
              '## pip-audit: vulnerabilities detected in mcp-chassis dependencies',
              '',
              `**Detected:** ${new Date().toISOString()}`,
              `**Package:** \`mcp-chassis\``,
              `**Count:** ${vulnCount} vulnerabilities`,
              '',
              '### Findings',
              vulnSummary,
              '',
              '### Action Required',
              '1. Review the findings above and the pip-audit artifact from the workflow run.',
              '2. Update affected dependencies in `pyproject.toml`.',
              '3. Re-run the Security Monitor workflow to confirm resolution.',
              '4. Close this issue once the workflow passes cleanly.',
              '',
              `_Triggered by: [Security Monitor workflow](https://github.com/${{ github.repository }}/actions/workflows/security-monitor.yml)_`,
            ].join('\n');

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Updated scan (${new Date().toISOString()}): ${vulnCount} vulnerabilities still present.\n\n${vulnSummary}`,
              });
              core.warning(`Updated existing issue #${existingIssue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `pip-audit: vulnerabilities detected in mcp-chassis dependencies (${new Date().toISOString().split('T')[0]})`,
                body,
                labels: ['security', 'vulnerability', 'pip-audit'],
              });
              core.warning(`Created issue #${newIssue.number}`);
            }

      - name: Create summary
        if: always()
        run: |
          echo "## Security Monitor — pip-audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: mcp-chassis" >> $GITHUB_STEP_SUMMARY
          echo "**Python**: ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.audit.outputs.exit_code }}" = "0" ]; then
            echo "No vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          else
            echo "Vulnerabilities detected — issue opened (or updated). See artifact for full report." >> $GITHUB_STEP_SUMMARY
          fi
