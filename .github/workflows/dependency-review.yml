name: Dependency Review

# Prevents introduction of vulnerable or non-compliant dependencies in PRs.
# Blocks merges with high/critical severity vulnerabilities.
# Denies GPL-3.0, AGPL-3.0, and SSPL licensed dependencies.

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dependencies: ${{ steps.filter.outputs.dependencies }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            dependencies:
              - 'pyproject.toml'
              - 'requirements*.txt'
              - '.github/workflows/dependency-review.yml'

  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dependencies == 'true'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0, SSPL-1.0
          comment-summary-in-pr: always
          warn-only: false

      - name: Create summary
        if: always()
        run: |
          echo "## Dependency Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Severity Threshold**: High" >> $GITHUB_STEP_SUMMARY
          echo "**Blocked Licenses**: GPL-3.0, AGPL-3.0, SSPL-1.0" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This check prevents introduction of vulnerable or license-incompatible dependencies." >> $GITHUB_STEP_SUMMARY
