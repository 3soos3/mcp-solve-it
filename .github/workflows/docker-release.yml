name: Docker - Build & Publish :release

# Builds signed release images with compound tag v{mcp}-si{solveit}.
# Two triggers:
#   1. Git tag push (v*.*.*) — new MCP release, pair with latest SOLVE-IT release
#   2. Daily schedule — detect new SOLVE-IT releases, rebuild with current MCP
#
# Tags: v{mcp}-si{solveit}, :release on GHCR + Docker Hub.  :latest also updated.
# Post-publish: Trivy scan (all arches), Cosign sign, SBOM (forever), SLSA.
# FORENSIC_METADATA=true — suitable for evidentiary deployments.
#
# Docker Hub retention: last 12 compound tags.
#
# Zenodo :release deposit: active when ZENODO_RELEASES_CONCEPT var is set.

on:
  push:
    tags: ['v*.*.*']
  schedule:
    - cron: '0 5 * * *'   # Daily 05:00 UTC — detect new SOLVE-IT releases
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_REPO: ghcr.io/${{ github.repository }}
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}
  PLATFORMS: linux/amd64,linux/arm64
  DOCKERHUB_VERSION_RETAIN: 12

jobs:
  check:
    name: Resolve versions and decide
    runs-on: ubuntu-latest
    outputs:
      rebuild: ${{ steps.decide.outputs.rebuild }}
      mcp_version: ${{ steps.decide.outputs.mcp_version }}
      mcp_sha: ${{ steps.decide.outputs.mcp_sha }}
      solveit_version: ${{ steps.solveit.outputs.solveit_version }}
      solveit_sha: ${{ steps.solveit.outputs.solveit_sha }}
      image_tag: ${{ steps.decide.outputs.image_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve MCP version
        id: mcp
        run: |
          MCP_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            MCP_VERSION="${GITHUB_REF#refs/tags/}"
          else
            MCP_VERSION=$(grep '^version' pyproject.toml | head -1 \
              | sed 's/version = "\(.*\)"/\1/')
          fi
          echo "mcp_sha=${MCP_SHA}"       >> $GITHUB_OUTPUT
          echo "mcp_version=${MCP_VERSION}" >> $GITHUB_OUTPUT

      - name: Resolve latest SOLVE-IT release
        id: solveit
        run: |
          # Query SOLVE-IT's own releases — not this repo's tags
          SOLVEIT_VERSION=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/SOLVE-IT-DF/solve-it/releases/latest" \
            | jq -r '.tag_name')

          if [ -z "$SOLVEIT_VERSION" ] || [ "$SOLVEIT_VERSION" = "null" ]; then
            echo "::error::Cannot determine latest SOLVE-IT release"
            exit 1
          fi

          # Resolve the tag to a SHA for reproducible checkout in Dockerfile
          SOLVEIT_SHA=$(git ls-remote \
            https://github.com/SOLVE-IT-DF/solve-it.git \
            "refs/tags/${SOLVEIT_VERSION}" | cut -f1)

          if [ -z "$SOLVEIT_SHA" ]; then
            echo "::warning::Cannot resolve SHA for ${SOLVEIT_VERSION} — using tag name"
          fi

          # Strip leading 'v' for the si{} part of the compound tag
          SOLVEIT_CLEAN=$(echo "$SOLVEIT_VERSION" | sed 's/^v//')

          echo "solveit_version=${SOLVEIT_VERSION}" >> $GITHUB_OUTPUT
          echo "solveit_sha=${SOLVEIT_SHA}"         >> $GITHUB_OUTPUT
          echo "solveit_clean=${SOLVEIT_CLEAN}"     >> $GITHUB_OUTPUT
          echo "::notice::SOLVE-IT release: ${SOLVEIT_VERSION} (${SOLVEIT_SHA:-tag})"

      - name: Decide rebuild
        id: decide
        env:
          MCP_VERSION: ${{ steps.mcp.outputs.mcp_version }}
          MCP_SHA: ${{ steps.mcp.outputs.mcp_sha }}
          SOLVEIT_CLEAN: ${{ steps.solveit.outputs.solveit_clean }}
        run: |
          IMAGE_TAG="${MCP_VERSION}-si${SOLVEIT_CLEAN}"

          echo "mcp_version=${MCP_VERSION}" >> $GITHUB_OUTPUT
          echo "mcp_sha=${MCP_SHA}"         >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}"     >> $GITHUB_OUTPUT

          # Check if this exact compound tag is already in GHCR
          EXISTS=$(docker manifest inspect ${{ env.GHCR_REPO }}:${IMAGE_TAG} 2>/dev/null \
            && echo "true" || echo "false")

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "::notice::Force rebuild of ${IMAGE_TAG}"
          elif [ "$EXISTS" = "false" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "::notice::${IMAGE_TAG} not found — building"
          else
            echo "rebuild=false" >> $GITHUB_OUTPUT
            echo "::notice::${IMAGE_TAG} already exists — skipping"
          fi

  build:
    name: Build & Publish ${{ needs.check.outputs.image_tag }}
    needs: check
    if: needs.check.outputs.rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      base_ref: ${{ steps.base.outputs.ref }}
      base_digest: ${{ steps.base.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_REPO != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v5.1.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.GHCR_REPO }}:${{ needs.check.outputs.image_tag }}
            ${{ env.GHCR_REPO }}:release
            ${{ env.GHCR_REPO }}:latest
            ${{ env.GHCR_REPO }}:sha-${{ needs.check.outputs.mcp_sha }}
            ${{ vars.DOCKERHUB_REPO != '' && format('{0}:{1}', env.DOCKERHUB_REPO, needs.check.outputs.image_tag) || '' }}
            ${{ vars.DOCKERHUB_REPO != '' && format('{0}:release', env.DOCKERHUB_REPO) || '' }}
            ${{ vars.DOCKERHUB_REPO != '' && format('{0}:latest', env.DOCKERHUB_REPO) || '' }}
          build-args: |
            SOLVE_IT_MODE=release
            FORENSIC_METADATA=true
            SOLVE_IT_VERSION=${{ needs.check.outputs.solveit_version }}
            SOLVEIT_SHA=${{ needs.check.outputs.solveit_sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ needs.check.outputs.mcp_sha }}
            VERSION=${{ needs.check.outputs.image_tag }}
            MCP_VERSION=${{ needs.check.outputs.mcp_version }}
          labels: |
            org.opencontainers.image.revision=${{ needs.check.outputs.mcp_sha }}
            org.opencontainers.image.version=${{ needs.check.outputs.image_tag }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
          provenance: true
          sbom: true

      - name: Capture base image digest
        id: base
        run: |
          BASE=$(grep '^FROM' Dockerfile | head -1 | awk '{print $2}')
          DIGEST=$(docker buildx imagetools inspect "$BASE" \
            --format '{{index .Manifest "digest"}}' 2>/dev/null || echo "")
          echo "ref=${BASE}"     >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Prune old Docker Hub compound tags (keep last 12)
        if: vars.DOCKERHUB_REPO != ''
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}
          RETAIN: ${{ env.DOCKERHUB_VERSION_RETAIN }}
        run: |
          TOKEN=$(curl -sf -X POST \
            "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.DOCKERHUB_USERNAME }}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.token')

          OWNER=$(echo "$DOCKERHUB_REPO" | cut -d/ -f1)
          REPO=$(echo "$DOCKERHUB_REPO" | cut -d/ -f2)

          # Compound tags match v*-si* pattern
          TAGS=$(curl -sf \
            "https://hub.docker.com/v2/repositories/${OWNER}/${REPO}/tags/?page_size=100" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r '.results[].name' \
            | grep -E '^v.+-si.+$' \
            | sort)

          COUNT=$(echo "$TAGS" | grep -c . || true)
          TO_DELETE=$(( COUNT - RETAIN ))

          if [ "$TO_DELETE" -gt 0 ]; then
            echo "$TAGS" | head -n "$TO_DELETE" | while read -r TAG; do
              echo "Deleting: ${TAG}"
              curl -sf -X DELETE \
                "https://hub.docker.com/v2/repositories/${OWNER}/${REPO}/tags/${TAG}/" \
                -H "Authorization: Bearer ${TOKEN}"
            done
          else
            echo "::notice::${COUNT} compound tags — no pruning needed"
          fi

  trivy-scan:
    name: Trivy scan (${{ matrix.platform }})
    needs: [check, build]
    if: needs.check.outputs.rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and export
        run: |
          PTAG=$(echo "${{ matrix.platform }}" | tr '/' '-' | sed 's/linux-//')
          docker pull --platform ${{ matrix.platform }} \
            ${{ env.GHCR_REPO }}:${{ needs.check.outputs.image_tag }}
          docker save ${{ env.GHCR_REPO }}:${{ needs.check.outputs.image_tag }} \
            -o /tmp/image-${PTAG}.tar
          echo "PTAG=${PTAG}" >> $GITHUB_ENV
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image-${{ env.PTAG }}.tar
          format: sarif
          output: trivy-release-${{ env.PTAG }}.sarif
          severity: CRITICAL,HIGH
          scanners: vuln
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-release-${{ env.PTAG }}.sarif
          category: trivy-release-${{ env.PTAG }}
        continue-on-error: true
      - name: Fail on CRITICAL
        run: |
          COUNT=$(trivy image --input /tmp/image-${{ env.PTAG }}.tar \
            --format json --severity CRITICAL --scanners vuln --quiet \
            | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
          [ "$COUNT" -gt 0 ] && echo "::error::${COUNT} CRITICAL CVEs on ${{ matrix.platform }}" && exit 1
          echo "::notice::No CRITICAL CVEs on ${{ matrix.platform }}"

  sign:
    name: Sign & Attest
    needs: [check, build, trivy-scan]
    if: needs.check.outputs.rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.15.9
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign with Cosign
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            "${{ env.GHCR_REPO }}:${{ needs.check.outputs.image_tag }}@${{ needs.build.outputs.digest }}"
      - name: Generate SBOM
        run: |
          syft "${{ env.GHCR_REPO }}@${{ needs.build.outputs.digest }}" \
            -o spdx-json=sbom-spdx.json -o cyclonedx-json=sbom-cyclonedx.json
      - name: Attach SBOM
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign attest --yes \
            --predicate sbom-spdx.json --type spdxjson \
            "${{ env.GHCR_REPO }}:${{ needs.check.outputs.image_tag }}@${{ needs.build.outputs.digest }}"
      - name: Upload SBOM artifact (retained forever — forensic evidence)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ needs.check.outputs.image_tag }}-${{ github.run_id }}
          path: sbom-*.json
          retention-days: 0
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.GHCR_REPO }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true
      - name: Summary
        run: |
          echo "## ${{ needs.check.outputs.image_tag }} published" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ needs.check.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP version | \`${{ needs.check.outputs.mcp_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SOLVE-IT release | \`${{ needs.check.outputs.solveit_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SOLVE-IT SHA | \`${{ needs.check.outputs.solveit_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verify:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify ${{ env.GHCR_REPO }}:${{ needs.check.outputs.image_tag }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp='https://github.com/${{ github.repository }}.*' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer='https://token.actions.githubusercontent.com'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ── Zenodo :release deposit ────────────────────────────────────────────────
  # Activated when ZENODO_RELEASES_CONCEPT var is set in repo settings.
  # Requires secrets: ZENODO_RELEASES_TOKEN
  # Requires vars:    ZENODO_RELEASES_CONCEPT (the concept record ID integer)

  zenodo-deposit:
    name: Zenodo deposit
    needs: [check, build, trivy-scan, sign]
    if: needs.check.outputs.rebuild == 'true' && vars.ZENODO_RELEASES_CONCEPT != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Clone SOLVE-IT data at pinned SHA
        env:
          SOLVEIT_SHA: ${{ needs.check.outputs.solveit_sha }}
        run: |
          git clone --depth=1 https://github.com/SOLVE-IT-DF/solve-it.git /tmp/solve-it
          if [ -n "$SOLVEIT_SHA" ]; then
            git -C /tmp/solve-it fetch --depth=1 origin "$SOLVEIT_SHA"
            git -C /tmp/solve-it checkout "$SOLVEIT_SHA"
          fi
          rm -rf /tmp/solve-it/.git

      - name: Create data ZIP and manifest
        env:
          TAG: ${{ needs.check.outputs.image_tag }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          # Include data, extension_data, solve_it_library (needed to read the data),
          # and SOLVE-IT attribution files. Exclude __pycache__ and compiled bytecode.
          zip -qr "solve-it-data-${TAG}.zip" \
            /tmp/solve-it/data \
            /tmp/solve-it/extension_data \
            /tmp/solve-it/solve_it_library \
            /tmp/solve-it/LICENSE \
            /tmp/solve-it/README.md \
            /tmp/solve-it/requirements.txt \
            -x "*/__pycache__/*" -x "*.pyc" -x "*.pyo"

          cat > manifest.json << EOF
          {
            "image_tag":       "${TAG}",
            "image_ref":       "ghcr.io/${{ github.repository }}:${TAG}",
            "image_digest":    "${DIGEST}",
            "mcp_version":     "${{ needs.check.outputs.mcp_version }}",
            "mcp_sha":         "${{ needs.check.outputs.mcp_sha }}",
            "solveit_version": "${{ needs.check.outputs.solveit_version }}",
            "solveit_sha":     "${{ needs.check.outputs.solveit_sha }}",
            "build_date":      "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "forensic_metadata": true,
            "base_image_ref":    "${{ needs.build.outputs.base_ref }}",
            "base_image_digest": "${{ needs.build.outputs.base_digest }}"
          }
          EOF

      - name: Create stripped source ZIP
        env:
          TAG: ${{ needs.check.outputs.image_tag }}
        run: |
          # git archive respects .gitattributes export-ignore — strips tests/,
          # docs/, .github/, dev Dockerfiles, etc. automatically.
          git archive HEAD --format=zip -o "source-${TAG}.zip"

      - name: Download SBOMs from sign job
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom-${{ needs.check.outputs.image_tag }}-${{ github.run_id }}

      - name: Deposit to Zenodo
        id: zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_RELEASES_TOKEN }}
          CONCEPT_ID: ${{ vars.ZENODO_RELEASES_CONCEPT }}
          TAG: ${{ needs.check.outputs.image_tag }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          set -e

          # Get the most recent published deposit for this concept
          LATEST_ID=$(curl -sf \
            "https://zenodo.org/api/deposit/depositions?q=conceptrecid:${CONCEPT_ID}&sort=mostrecent&size=1" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" | jq -r '.[0].id // empty')

          if [ -z "$LATEST_ID" ]; then
            echo "::error::No deposit found for concept ${CONCEPT_ID} — create the first version manually on zenodo.org, then re-run."
            exit 1
          fi

          # Create a new draft version
          DRAFT=$(curl -sf -X POST \
            "https://zenodo.org/api/deposit/depositions/${LATEST_ID}/actions/newversion" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}")
          DRAFT_ID=$(echo "$DRAFT" | jq -r '.links.latest_draft' | grep -oE '[0-9]+$')

          # Clear files inherited from the previous version
          FILE_IDS=$(curl -sf \
            "https://zenodo.org/api/deposit/depositions/${DRAFT_ID}/files" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" | jq -r '.[].id')
          for fid in $FILE_IDS; do
            curl -sf -X DELETE \
              "https://zenodo.org/api/deposit/depositions/${DRAFT_ID}/files/${fid}" \
              -H "Authorization: Bearer ${ZENODO_TOKEN}"
          done

          # Get bucket URL for file uploads
          BUCKET=$(curl -sf \
            "https://zenodo.org/api/deposit/depositions/${DRAFT_ID}" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" | jq -r '.links.bucket')

          # Upload files
          for file in manifest.json "source-${TAG}.zip" sbom-spdx.json sbom-cyclonedx.json "solve-it-data-${TAG}.zip"; do
            [ -f "$file" ] || { echo "::warning::Skipping missing file: ${file}"; continue; }
            echo "Uploading ${file} ..."
            curl -sf -X PUT "${BUCKET}/${file}" \
              -H "Authorization: Bearer ${ZENODO_TOKEN}" \
              --upload-file "$file"
          done

          # Update metadata
          curl -sf -X PUT \
            "https://zenodo.org/api/deposit/depositions/${DRAFT_ID}" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "SOLVE-IT MCP Server — Release ${TAG}" \
              --arg desc "FSS-compliant MCP server for the SOLVE-IT digital forensics knowledge base. Release <code>${TAG}</code>. GHCR image digest: <code>${DIGEST}</code>." \
              --arg ver "${TAG}" \
              --arg repo "https://github.com/${{ github.repository }}" \
              '{metadata: {
                title: $title,
                upload_type: "software",
                description: $desc,
                version: $ver,
                creators: [{name: "mcp-solve-it contributors"}],
                keywords: ["MCP","SOLVE-IT","digital forensics","knowledge base","FSS","forensic science"],
                license: "MIT",
                related_identifiers: [
                  {identifier: $repo,                                    relation: "isSupplementTo", scheme: "url"},
                  {identifier: "https://github.com/SOLVE-IT-DF/solve-it", relation: "isDerivedFrom",  scheme: "url"}
                ]
              }}')"

          # Publish and capture DOI
          DOI=$(curl -sf -X POST \
            "https://zenodo.org/api/deposit/depositions/${DRAFT_ID}/actions/publish" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" | jq -r '.doi')

          echo "doi=${DOI}" >> $GITHUB_OUTPUT
          echo "## Zenodo Deposit" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| DOI | https://doi.org/${DOI} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${DIGEST}\` |" >> $GITHUB_STEP_SUMMARY
          echo "::notice::Zenodo DOI: https://doi.org/${DOI}"
