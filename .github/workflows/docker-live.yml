name: Docker - Build & Publish :live

# Builds and publishes the :live image on push to main and weekly.
# Data is NOT baked in — the entrypoint fetches at container startup.
# Published to GHCR and Docker Hub as :live (always overwritten, no history).
# Not FSS-compliant (FORENSIC_METADATA=false).
# Security: Trivy CVE scan only — no Cosign signing (non-evidentiary).

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'src/**'
      - 'pyproject.toml'
  schedule:
    - cron: '0 4 * * 1'   # Weekly Monday 04:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true   # OK to cancel — :live is always overwritten

env:
  GHCR_REPO: ghcr.io/${{ github.repository }}
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    name: Build & Publish :live
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_REPO != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :live
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v5.1.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.GHCR_REPO }}:live
            ${{ vars.DOCKERHUB_REPO != '' && format('{0}:live', env.DOCKERHUB_REPO) || '' }}
          build-args: |
            SOLVE_IT_MODE=live
            FORENSIC_METADATA=false
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=live
          cache-from: type=gha,scope=live
          cache-to: type=gha,mode=max,scope=live

  trivy-scan:
    name: Trivy scan :live
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.GHCR_REPO }}:live
          format: sarif
          output: trivy-live.sarif
          severity: CRITICAL,HIGH
          scanners: vuln
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-live.sarif
          category: trivy-live
        continue-on-error: true
