name: Docker - Build & Publish :live

# Builds and publishes the :live image on push to main.
# Data is NOT baked in — the entrypoint fetches at container startup.
# Published to GHCR and Docker Hub as :live (always overwritten, no history).
# Not FSS-compliant (FSS_METADATA=false).
# Post-publish: Trivy CVE scan, Cosign sign, SBOM, SLSA provenance.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true   # OK to cancel — :live is always overwritten

env:
  GHCR_REPO: ghcr.io/${{ github.repository }}
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    name: Build & Publish :live
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_REPO != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :live
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v5.1.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.GHCR_REPO }}:live
            ${{ vars.DOCKERHUB_REPO != '' && format('{0}:live', env.DOCKERHUB_REPO) || '' }}
          build-args: |
            SOLVE_IT_MODE=live
            FSS_METADATA=false
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=live
          cache-from: type=gha,scope=live
          cache-to: type=gha,mode=max,scope=live
          provenance: true
          sbom: true

  trivy-scan:
    name: Trivy scan :live
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.GHCR_REPO }}:live
          format: sarif
          output: trivy-live.sarif
          severity: CRITICAL,HIGH
          scanners: vuln
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-live.sarif
          category: trivy-live
        continue-on-error: true

  sign:
    name: Sign & Attest
    needs: [build, trivy-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.15.9
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign with Cosign
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            "${{ env.GHCR_REPO }}:live@${{ needs.build.outputs.digest }}"
      - name: Generate SBOM
        run: |
          syft "${{ env.GHCR_REPO }}@${{ needs.build.outputs.digest }}" \
            -o spdx-json=sbom-spdx.json -o cyclonedx-json=sbom-cyclonedx.json
      - name: Attach SBOM
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign attest --yes \
            --predicate sbom-spdx.json --type spdxjson \
            "${{ env.GHCR_REPO }}:live@${{ needs.build.outputs.digest }}"
      - name: Upload SBOM artifact (90 days)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-live-${{ github.run_id }}
          path: sbom-*.json
          retention-days: 90
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.GHCR_REPO }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true
